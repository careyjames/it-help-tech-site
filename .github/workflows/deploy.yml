name: Deploy static site → S3 + CloudFront

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Least-privilege default for GITHUB_TOKEN. The deploy job authenticates to AWS
# via repository secrets (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY), not via
# GITHUB_TOKEN, so `contents: read` is sufficient. If a future job needs to
# write back to the repo (e.g. comment on PRs, push tags), grant the extra
# scope on that specific job rather than widening this default.
permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      BUCKET: www.it-help.tech  # <--- CHANGED for your new S3 bucket
      DIST_ID: ${{ secrets.CF_DIST_ID_IT_HELP_TECH }} # <--- CHANGED to use the new secret name

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install Zola
        uses: taiki-e/install-action@481c34c1cf3a84c68b5e46f4eccfc82af798415a # v2
        with:
          tool: zola

      - name: Build site with Zola
        run: zola build

      - name: Purge unused CSS
        run: |
          npm install -g purgecss
          # IMPORTANT: quote the --content glob.
          # When unquoted, bash (without `globstar`) expands `public/**/*.html`
          # to `public/*/*.html`, which matches files in IMMEDIATE subdirs only
          # and silently SKIPS:
          #   - public/index.html        (homepage — selectors only used here)
          #   - public/404.html
          #   - public/blog/<post>/index.html  (two levels deep)
          # The result is PurgeCSS strips ~30 KB of homepage-specific rules
          # (.hero-wrapper, .logo-container, .homepage-body, .homepage-hero,
          #  .tech-particles, .main-logo, .tagline, .blob, .hex-decoration, …)
          # from late-overrides.css, breaking the homepage in production.
          # Quoting forces PurgeCSS's own glob lib (which honours `**`) to do
          # the expansion correctly, recursively.
          purgecss \
            --css public/css/*.css \
            --content "public/**/*.html" \
            --output public/css/ \
            --safelist "phone-line" --safelist "particle" \
            --safelist "is-copied" --safelist "is-copy-error"

      - name: Minify CSS and hero JS (safe ship-time optimization)
        run: |
          npm install -g clean-css-cli terser

          # Minify CSS in place after PurgeCSS so source files stay readable in git.
          find public/css -type f -name '*.css' -print0 | while IFS= read -r -d '' f; do
            cleancss -O1 -o "$f" "$f"
          done

          # Minify the custom hero animation script shipped to browsers.
          if [ -f public/js/hero-logo.js ]; then
            terser public/js/hero-logo.js --compress --output public/js/hero-logo.js
          fi

      - name: Remove KaTeX assets when unused
        run: |
          if find public -name '*.html' -print0 | xargs -0 grep -qi "katex"; then
            echo "KaTeX detected in HTML; keeping assets."
          else
            echo "No KaTeX references found; removing KaTeX assets."
            rm -f public/katex.min.css
            rm -f public/js/katex*.js public/js/katexoptions.js
            find public -type f -name 'KaTeX*' -delete
          fi

      - name: Copy images and root files
        run: |
          cp -r static/images public/
          cp static/robots.txt static/ithelp-logo-sig-seablue.html static/ithelp-logo-sig-gold.html static/ithelp-anilogo.html static/red-plus.ico static/bimi-logo.svg public/

      - name: Verify no external subresources (advisory)
        # Was the COEP require-corp safety net (Sub-4-bis). COEP was rolled back
        # because Safari blocks the page under require-corp when same-origin S3
        # assets do not carry per-asset CORP headers (CloudFront response-headers
        # policy only attaches to the document, not the S3-served assets).
        # Kept as an advisory check so future external embeds get flagged in the
        # build log even though they no longer break security headers.
        # See PROJECT_EVOLUTION_LOG.md (2026-04-17 Hotfix · Revert COEP).
        run: ./scripts/check-no-external-subresources.sh

      - name: Update CloudFront signature-pages security headers policy (CSP)
        run: |
          if [ -n "${POLICY_ID_SIGNATURES:-}" ]; then
            ./infra/cloudfront/update_policy_signatures.sh
          else
            echo "CF_HEADERS_POLICY_ID_SIGNATURES not set; skipping signature CSP update."
          fi
        env:
          POLICY_ID_SIGNATURES: ${{ secrets.CF_HEADERS_POLICY_ID_SIGNATURES }}
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Update CloudFront site security headers policy (CSP)
        run: ./infra/cloudfront/update_policy.sh
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload immutable assets
        run: |
          aws s3 sync public/ s3://$BUCKET/ \
            --exclude "*.html" --exclude "llms*.txt" \
            --cache-control "public,max-age=31536000,immutable" \
            --metadata-directive REPLACE \
            --exact-timestamps \
            --delete
        env:
          AWS_S3_BUCKET: ${{ env.BUCKET }}
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload HTML (short TTL)
        run: |
          aws s3 sync public/ s3://$BUCKET/ \
            --exclude "*" --include "*.html" \
            --cache-control "public,max-age=3600,stale-while-revalidate=86400" \
            --metadata-directive REPLACE \
            --exact-timestamps \
            --delete
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Generate llms-full.txt from content/
        # Source of truth: infra/llms/llms-full.config.json + content/*.md.
        # Fail-closed: if the generator throws, the deploy stops here, before any
        # llms-* file is uploaded — better than shipping a stale or incomplete LLM
        # corpus. See infra/llms/README.md for the runbook.
        run: node infra/llms/build-llms-full.mjs

      - name: Upload LLMS files (short TTL for freshness)
        # llms-full.txt comes from build/ (generator output, source of truth).
        # llms.txt is the small hand-maintained nav index in static/.
        # Both get a short TTL with stale-while-revalidate so AI bots see updates
        # within an hour while still tolerating origin hiccups.
        run: |
          aws s3 cp build/llms-full.txt "s3://$BUCKET/llms-full.txt" \
            --content-type "text/plain; charset=utf-8" \
            --cache-control "public,max-age=3600,stale-while-revalidate=86400" \
            --metadata-directive REPLACE
          aws s3 cp static/llms.txt "s3://$BUCKET/llms.txt" \
            --content-type "text/plain; charset=utf-8" \
            --cache-control "public,max-age=3600,stale-while-revalidate=86400" \
            --metadata-directive REPLACE

        env:
          AWS_S3_BUCKET: ${{ env.BUCKET }}
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Invalidate CloudFront cache and wait
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation --distribution-id $DIST_ID --paths '/*' --query 'Invalidation.Id' --output text)
          echo "Created CloudFront invalidation: $INVALIDATION_ID"

          # The built-in waiter times out around 10 minutes. Use explicit polling so
          # transiently slow invalidations do not fail otherwise healthy deploys.
          MAX_ATTEMPTS=90
          SLEEP_SECONDS=20

          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            STATUS=$(aws cloudfront get-invalidation \
              --distribution-id "$DIST_ID" \
              --id "$INVALIDATION_ID" \
              --query 'Invalidation.Status' \
              --output text)

            echo "Invalidation status attempt ${ATTEMPT}/${MAX_ATTEMPTS}: ${STATUS}"

            if [ "$STATUS" = "Completed" ]; then
              echo "CloudFront invalidation $INVALIDATION_ID completed."
              exit 0
            fi

            sleep "$SLEEP_SECONDS"
          done

          echo "::error::CloudFront invalidation $INVALIDATION_ID did not complete within $((MAX_ATTEMPTS * SLEEP_SECONDS)) seconds."
          exit 1
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  audit:
    # Post-deploy quality gate. Runs after the CloudFront invalidation
    # completes (so Lighthouse hits the freshly published bytes) and
    # fails the build if Lighthouse or Mozilla Observatory regress
    # below the thresholds in infra/audit/audit.config.json.
    if: ${{ github.event_name == 'push' }}
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install Lighthouse + Chromium
        run: |
          npm install -g lighthouse@12
          # ubuntu-latest ships Chromium via apt; install the headless
          # build that Lighthouse spawns through CHROME_PATH.
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
          echo "CHROME_PATH=$(command -v chromium-browser || command -v chromium)" >> "$GITHUB_ENV"

      - name: Lighthouse audit (mobile + desktop)
        run: node infra/audit/run-lighthouse.mjs

      - name: Mozilla Observatory audit
        run: node infra/audit/run-observatory.mjs

  indexnow-ping:
    # Best-effort instant-indexing notification to IndexNow-participating
    # search engines (Bing, Yandex, Seznam.cz, Naver, Yep — Google does NOT
    # participate, so this is purely additive to our existing sitemap-driven
    # crawl posture). Diff-driven: pings ONLY URLs whose markdown source
    # actually changed in this push, plus their parent section listing and
    # affected taxonomy term listings (categories/tags). Drafts are
    # filtered. Empty diff = no ping. continue-on-error so a network blip
    # on api.indexnow.org cannot fail the deploy. Isolated job so the
    # audit gate (98/A+/120) is the only quality gate. Spec:
    # https://www.indexnow.org/documentation. Implementation:
    # infra/indexnow/submit.py.
    if: ${{ github.event_name == 'push' }}
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      INDEXNOW_KEY: d6ff22bcff9d13ff0628919ec002cfa60387f3900ef201f5abfc28ab24f8361d
      HOST: www.it-help.tech
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Submit changed content URLs to IndexNow
        # All implementation details (pathspec semantics, draft filtering,
        # parent-section URL inference, taxonomy-term URL union over BEFORE
        # and AFTER frontmatter, rename/delete handling) live in
        # infra/indexnow/submit.py. The script is idempotent, network-
        # tolerant (always exits 0), and writes a $GITHUB_STEP_SUMMARY block.
        # Architect-reviewed on PR #589.
        run: |
          set -euo pipefail
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          python3 infra/indexnow/submit.py "$BEFORE" "$AFTER" "$HOST" "$INDEXNOW_KEY"

  google-indexing-ping:
    # Best-effort instant-indexing notification to the Google Indexing API
    # (https://indexing.googleapis.com/v3/urlNotifications:publish). Auth
    # is keyless OIDC via Workload Identity Federation — see the GCP setup
    # documented in PROJECT_EVOLUTION_LOG.md (2026-04-19 WIF entry). No
    # service-account JSON keys exist in this project (org policy
    # iam.disableServiceAccountKeyCreation is enforced).
    #
    # URL set comes from the SAME shared collector that drives IndexNow
    # (infra/indexing/urlset.py) so the two notifiers can never drift.
    #
    # Preflight: if the GCP_WIF_PROVIDER / GCP_INDEXING_SA_EMAIL repo
    # Variables are unset (e.g. credentials being rotated, fork PR), the
    # job writes a clear skip-summary and exits without attempting auth.
    #
    # continue-on-error so any indexing-side failure cannot fail the
    # deploy or regress the audit gate. Implementation:
    # infra/google-indexing/submit.py.
    if: ${{ github.event_name == 'push' }}
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write  # REQUIRED for the OIDC token exchange.
    env:
      HOST: www.it-help.tech
    steps:
      - name: Preflight — check WIF Variables are configured
        id: preflight
        run: |
          set -euo pipefail
          if [ -z "${{ vars.GCP_WIF_PROVIDER }}" ] || [ -z "${{ vars.GCP_INDEXING_SA_EMAIL }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Google Indexing API"
              echo ""
              echo "Skipped: GCP_WIF_PROVIDER and/or GCP_INDEXING_SA_EMAIL repo Variables are unset."
              echo "Configure under Settings → Secrets and variables → Actions → Variables tab."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.preflight.outputs.configured == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud (OIDC)
        if: steps.preflight.outputs.configured == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_INDEXING_SA_EMAIL }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/indexing
          export_environment_variables: true

      - name: Submit changed URLs to Google Indexing API
        if: steps.preflight.outputs.configured == 'true'
        # Implementation in infra/google-indexing/submit.py. Reuses the
        # shared URL collector, fails soft, caps at 50 URLs/run, writes
        # a per-URL status table to $GITHUB_STEP_SUMMARY.
        run: |
          set -euo pipefail
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          python3 infra/google-indexing/submit.py "$BEFORE" "$AFTER" "$HOST"

  pr-note:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: echo "Deploy runs only on push to main; this PR job exists so GitHub doesn't report 'No jobs were run'."
