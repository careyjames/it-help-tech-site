<!--
  IT-HELP — SVG icon sprite for the footer org-tree (and reusable elsewhere).

  USAGE:
    Inject the contents of this file at the bottom of <body> in templates/base.html
    (just before </body>), wrapped exactly as shown:

        <svg width="0" height="0" style="position:absolute" aria-hidden="true">
          {# paste contents of this file here #}
        </svg>

    Then anywhere on the page:
        <svg class="ftr-icon" aria-hidden="true"><use href="#i-building"/></svg>

  ICON SET: 8 symbols required by the footer-org partial.
    i-building, i-landmark, i-briefcase, i-calendar, i-brain,
    i-tools, i-microchip, i-shield

  PROVENANCE: paths are minimal stylized line glyphs authored for this package
  (no external license dependencies). Replace freely with Feather Icons /
  Font Awesome free / Tabler Icons if you prefer those — keep the symbol ids
  the same and the partial works unchanged.

  STYLING: each <symbol> uses viewBox="0 0 24 24", stroke-based, currentColor.
  Footer CSS (.ftr-icon) sets width/height/color — do not hardcode here.
-->

<symbol id="i-building" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <rect x="4" y="3" width="16" height="18" rx="1"/>
  <path d="M8 7h2M14 7h2M8 11h2M14 11h2M8 15h2M14 15h2"/>
  <path d="M10 21v-3h4v3"/>
</symbol>

<symbol id="i-landmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <path d="M3 21h18"/>
  <path d="M3 9l9-6 9 6"/>
  <path d="M5 9v9M9 11v7M15 11v7M19 9v9"/>
  <path d="M3 18h18"/>
</symbol>

<symbol id="i-briefcase" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <rect x="2.5" y="7" width="19" height="13" rx="2"/>
  <path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/>
  <path d="M2.5 13h19"/>
</symbol>

<symbol id="i-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <rect x="3" y="5" width="18" height="16" rx="2"/>
  <path d="M3 10h18"/>
  <path d="M8 3v4M16 3v4"/>
</symbol>

<symbol id="i-brain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <path d="M9 4a3 3 0 0 0-3 3v1a3 3 0 0 0-2 5 3 3 0 0 0 2 5v1a3 3 0 0 0 3 3h1V4H9z"/>
  <path d="M15 4a3 3 0 0 1 3 3v1a3 3 0 0 1 2 5 3 3 0 0 1-2 5v1a3 3 0 0 1-3 3h-1V4h1z"/>
  <path d="M10 9h1M10 15h1M13 9h1M13 15h1"/>
</symbol>

<symbol id="i-tools" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <path d="M14.7 6.3a3 3 0 0 0-4.2 4.2L4 17l3 3 6.5-6.5a3 3 0 0 0 4.2-4.2l-2 2-1.4-1.4 2-2z"/>
  <path d="M3 21l4-4"/>
</symbol>

<symbol id="i-microchip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <rect x="6" y="6" width="12" height="12" rx="1"/>
  <rect x="9" y="9" width="6" height="6"/>
  <path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/>
</symbol>

<symbol id="i-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/>
  <path d="M9 12l2 2 4-4"/>
</symbol>
