<picture>
  <source type="image/avif"
          srcset="{{ base }}-320.avif 320w,
                  {{ base }}-512.avif 512w,
                  {{ base }}-640.avif 640w,
                  {{ base }}-960.avif 960w,
                  {{ base }}-1280.avif 1280w"
          sizes="{{ sizes | default(value='(min-width: 800px) 480px, 92vw') }}">
  <source type="image/webp"
          srcset="{{ base }}-320.webp 320w,
                  {{ base }}-512.webp 512w,
                  {{ base }}-640.webp 640w,
                  {{ base }}-960.webp 960w,
                  {{ base }}-1280.webp 1280w"
          sizes="{{ sizes | default(value='(min-width: 800px) 480px, 92vw') }}">
  <img {% if lcp %}loading="eager" fetchpriority="high"{% else %}loading="lazy"{% endif %}
       decoding="async"
       width="{{ width | default(value=960) }}"
       height="{{ height | default(value=960) }}"
       src="{{ base }}-640.webp"
       alt="{{ alt | escape }}">
</picture>
